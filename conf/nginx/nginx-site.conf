server {
    # Listen on the port provided by Render's environment variable
    listen ${PORT:-80};
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Timeout settings
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_read_timeout 300;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Try both connection methods (comment out the one that doesn't work)
        fastcgi_pass 127.0.0.1:9000;  # TCP connection
        # fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;  # Unix socket (alternative)
        
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "memory_limit=256M";
        
        # PHP-FPM timeouts
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
        
        include fastcgi_params;
    }
}